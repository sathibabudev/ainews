name: Daily AI News

on:
  schedule:
    # 12:00 UTC daily. Edit this cron expression to change the run time.
    - cron: "0 12 * * *"
  workflow_dispatch: {} # allows manual "Run workflow" trigger for testing

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate today's news page
        run: node scripts/generate.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prune old pages and rebuild index
        run: node scripts/prune.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily AI news update: $(date -u +'%Y-%m-%d')"
            git push
          fi
