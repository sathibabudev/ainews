<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI News Archive</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f5fb;
    --bg-accent-1: #eef0ff;
    --bg-accent-2: #fdf1ff;
    --surface: #ffffff;
    --surface-border: #e6e8f5;
    --text: #171a2b;
    --text-muted: #5c6178;
    --accent: #6d5bff;
    --accent-2: #17b6c9;
    --accent-3: #e84393;
    --shadow: 0 1px 2px rgba(23, 26, 43, 0.05), 0 10px 26px rgba(23, 26, 43, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0c16;
      --bg-accent-1: #12142a;
      --bg-accent-2: #170f22;
      --surface: rgba(255, 255, 255, 0.045);
      --surface-border: rgba(255, 255, 255, 0.09);
      --text: #eef0fb;
      --text-muted: #9aa0bd;
      --accent: #8b7bff;
      --accent-2: #37e0ea;
      --accent-3: #ff77b7;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 14px 32px rgba(0, 0, 0, 0.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg-accent-1), transparent 60%),
      radial-gradient(1000px 500px at 110% 10%, var(--bg-accent-2), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    line-height: 1.6;
  }
  .page { max-width: 980px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: .4rem;
    font-size: .78rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    padding: .3rem .7rem; border-radius: 999px; margin-bottom: 1rem;
  }
  h1 {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    margin: 0 0 .5rem;
    background: linear-gradient(90deg, var(--text), var(--accent) 120%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: -0.02em;
  }
  .subtitle { color: var(--text-muted); font-size: 1rem; margin: 0; }
  .nav-link {
    display: inline-flex; align-items: center; gap: .4rem;
    margin-top: 1.25rem;
    padding: .55rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--surface-border);
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    font-size: .9rem; font-weight: 500;
    box-shadow: var(--shadow);
    transition: transform .15s ease, border-color .15s ease;
  }
  .nav-link:hover { transform: translateY(-1px); border-color: var(--accent); }
  .takeaways {
    margin: 2rem 0;
    padding: 1.4rem 1.6rem;
    border-radius: 16px;
    border: 1px solid var(--surface-border);
    border-left: 4px solid var(--accent);
    background: var(--surface);
    box-shadow: var(--shadow);
  }
  .takeaways h2 { margin: 0 0 .75rem; font-size: .85rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
  .takeaways ul { margin: 0; padding-left: 1.2rem; }
  .takeaways li { margin-bottom: .5rem; }
  .takeaways li:last-child { margin-bottom: 0; }
  section.group { margin-top: 3rem; }
  .group-header { display: flex; align-items: baseline; gap: .6rem; margin-bottom: 1.25rem; }
  .group-header h2 { font-size: 1.3rem; margin: 0; }
  .group-count { color: var(--text-muted); font-size: .85rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .card {
    display: flex; flex-direction: column; gap: .6rem;
    padding: 1.25rem; border-radius: 14px;
    border: 1px solid var(--surface-border);
    background: var(--surface);
    box-shadow: var(--shadow);
    text-decoration: none; color: inherit;
    transition: transform .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .card h3 { margin: 0; font-size: 1.05rem; line-height: 1.4; color: var(--text); }
  .card p { margin: 0; color: var(--text-muted); font-size: .92rem; }
  .card .meta { margin-top: auto; display: flex; flex-wrap: wrap; gap: .4rem; padding-top: .5rem; }
  .pill {
    display: inline-flex; align-items: center; gap: .3rem;
    font-size: .75rem; font-weight: 500;
    padding: .25rem .55rem; border-radius: 999px;
    background: color-mix(in srgb, var(--accent-2) 16%, transparent);
    color: var(--text);
    border: 1px solid color-mix(in srgb, var(--accent-2) 32%, transparent);
  }
  .pill.lang {
    background: color-mix(in srgb, var(--accent-3) 16%, transparent);
    border-color: color-mix(in srgb, var(--accent-3) 32%, transparent);
  }
  .empty {
    padding: 1.5rem; border-radius: 14px; border: 1px dashed var(--surface-border);
    color: var(--text-muted); text-align: center;
  }
  .archive-list { display: flex; flex-direction: column; gap: .6rem; list-style: none; padding: 0; margin: 0; }
  .archive-list a {
    display: flex; align-items: center; justify-content: space-between;
    padding: .85rem 1.1rem; border-radius: 12px;
    border: 1px solid var(--surface-border);
    background: var(--surface);
    box-shadow: var(--shadow);
    color: var(--text); text-decoration: none; font-weight: 500;
    transition: transform .15s ease, border-color .15s ease;
  }
  .archive-list a:hover { transform: translateX(3px); border-color: var(--accent); }
  .archive-list a::after { content: "\2192"; color: var(--accent); }
  footer.page-footer {
    margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--surface-border);
    color: var(--text-muted); font-size: .85rem;
  }
</style>
</head>

      <h1>AI News Archive</h1>

    </div>

      </ul></section>
    <footer class="page-footer">Generated automatically by the Daily AI News pipeline.</footer>
  </div>
</body>
</html>
